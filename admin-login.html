<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">


<title>
Velora Atelier | Admin Login
</title>


<link rel="stylesheet"
href="admin-login.css">


<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap"
rel="stylesheet">


</head>



<body>



<!-- ========================= -->
<!-- LOGIN CONTAINER -->
<!-- ========================= -->


<section class="login-section">



<div class="login-box">



<div class="brand">


<h1>
Velora Atelier
</h1>


<p>
Admin Portal
</p>


</div>





<form id="adminLoginForm">



<label>
Email Address
</label>


<input

type="email"

id="adminEmail"

placeholder="Enter admin email"

required

>





<label>
Password
</label>


<input

type="password"

id="adminPassword"

placeholder="Enter password"

required

>





<button
type="submit"
class="login-btn">


Login Dashboard


</button>




</form>



<p class="security-text">

Secure Admin Access

</p>



</div>



</section>





<script src="admin-auth.js"></script>


</body>

</html>
<script 
type="module"
src="firebase-config.js">
</script>
